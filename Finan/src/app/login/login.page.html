<ion-content>
  <div class="background-wrapper">
    <div class="overlay">
      
      <div class="login-card">
        <h1>ENTRAR</h1>

        <!-- Botão Google -->
        <div class="google-auth-container">
          <button class="google-btn" (click)="loginComGoogle()">
            <img src="assets/icon-google.png" alt="Google Icon">
            Continue with Google
          </button>
        </div>

        <div class="form-container">
          <ion-item lines="none" class="custom-input">
            <ion-label position="stacked">E-mail</ion-label>
            <ion-input type="email" [(ngModel)]="usuario.email"></ion-input>
          </ion-item>

          <ion-item lines="none" class="custom-input">
            <ion-label position="stacked">Senha</ion-label>
          <ion-input type="password" [(ngModel)]="usuario.senha"></ion-input>
          </ion-item>
        </div>

        <ion-button expand="block" (click)="realizarLogin()" class="btn-entrar">
          Entrar
        </ion-button>
      </div>

    </div>
  </div>
</ion-content>
