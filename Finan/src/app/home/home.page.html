<ion-content [fullscreen]="true" scrollY="false">
  <div class="welcome-container">
    
    <div class="header-section">
      <img src="assets/Logo for Finance App 'DreamFinance'.png" alt="DreamFinance Logo" class="logo">
    </div>

    <div class="footer-section">
      <h2>Transforme seus planos em realidade, centavo por centavo</h2>
      
      <div class="button-group">
        <ion-button 
          expand="block" 
          class="btn-purple" 
          shape="round" 
          routerLink="/cadastro">
          Cadastre-se
        </ion-button>
        
        <ion-button 
          expand="block" 
          class="btn-gray" 
          shape="round" 
          routerLink="/login">
          Entrar
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>
